  multilingual_interface: "Geek Uninstaller 界面已翻译成多种语言："
  review_1: Geek Uninstaller 的表现令人印象深刻。它的卸载速度很快，还能找到其他工具找不到的残留文件。总之，这款应用是一款令人印象深刻的维护工具，性能和功能兼备。强烈推荐。
  review_2: 总的来说，Geek Uninstaller 是一款非常好用的小工具。由于其直观的布局和整体简洁性，即使是没有经验的用户也能轻松上手。
  review_3: 如果你希望在卸载程序时确保系统不留下任何残留，Geek Uninstaller 是你的不二之选。
  review_4: Geek Uninstaller 既便携，又几乎支持所有你对卸载工具期待的功能。单个文件占用空间极小，非常适合放在 U 盘里使用。
  review_5: 我受够了之前为了管理 32 位和 64 位应用程序而使用的各种不同的卸载工具。它们不仅效果不理想，而且大多臃肿不堪，充满了我根本不需要的鸡肋功能。Geek Uninstaller 对我来说就是完美的卸载工具。界面简洁完美，卸载快速准确。真希望我能早点发现它——就在一周前，我终于受够了另一款免费 64 位卸载工具，咬咬牙买了 Revo Pro 的许可证……结果我太喜欢你们的软件了，装上以后用它把 Revo Pro 给卸载了，哈哈。
  review_6: 我以前用过其他卸载工具（比如 Revo Uninstaller 之类的），但你们的产品完胜它们。它非常易用，而且从没遇到过 Revo 那种程序列表不显示的问题。我经常安装和卸载软件，Geek Uninstaller 确实让我的生活更轻松了，更不用说我的电脑也因此干净多了。再次感谢你们做出这么优秀的产品。
  review_7: 我只是想说非常感谢你们开发了这么好的一款软件。最近我试过 Revo Uninstaller 和 IObit Uninstaller，但用起来都不太满意。Revo Uninstaller 无法列出我所有的程序，IObit Uninstaller 又清理得太多，导致其他程序冲突。所以简单来说……我一度放弃了使用任何卸载工具，直到我下载了 Geek Uninstaller。你们真的做出了比竞争对手好得多的产品……我只想说声谢谢。我已经开始向朋友和家人推荐你们的产品了。你们做得很好，继续保持！
  review_8: 这些年来我试过无数卸载工具。Geek Uninstaller 毫无疑问是我见过的最好的卸载工具。简单、极其高效、易用，轻松搞定工作。

